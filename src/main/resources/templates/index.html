<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <title>Judo Academic</title>
</head>
<body>
<!--    <h1 th:text="${title}"></h1>-->
    <header>
        <nav class="navbar" id="navbar">
            <div class="nav-container">
                <div th:insert="fragments/sections/logo-section :: logo"></div>
                <div th:insert="fragments/sections/menu-section :: menu"></div>
                <div th:insert="fragments/sections/mobile-menu-section :: mobile"></div>
            </div>
        </nav>
    </header>

    <main>
<!--          <h1 th:text="${title}" style="color: red;"></h1>-->
        <div th:insert="fragments/sections/hero-section      :: hero"></div>
        <div th:insert="fragments/sections/nosotros-section  :: nosotros"></div>
        <div th:insert="fragments/sections/maestros-section  :: maestros"></div>
        <div th:insert="fragments/sections/videos-section    :: videos"></div>
        <div th:insert="fragments/sections/programas-section :: programas"></div>
        <div th:insert="fragments/sections/credo-section     :: credo"></div>
        <div th:insert="fragments/sections/filosofia-section :: filosofia"></div>
        <div th:insert="fragments/sections/contacto-section  :: contacto"></div>
        <div th:insert="fragments/sections/banner-section    :: banner"></div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="js/app.js" defer></script>
<!--    <script src="js/app.js?v=2" defer></script>-->
</body>

</html>
